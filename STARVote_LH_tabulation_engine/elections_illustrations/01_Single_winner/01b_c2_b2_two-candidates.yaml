election_title: The simplest possible single-winner STAR example
scenario_description: |-
  Same as before, but this time with one more ballot — from George:
  
  George - he likes only Choco:
  - he loves the Choco flavor (5 stars)
  - he dislikes Vanilla (0 stars)


voting_method: STAR   # STAR Voting - Single-winner
num_winners: 1

ballots: |-
  Choco,Vanilla
      5,      3       # Caroline - she likes both flavors
      5,      0       # George - he likes only one flavor (Choco)

expected_winners:
  - Choco

