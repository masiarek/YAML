election_title: The simplest possible single-winner STAR example

# This is an unusual scenario - used only for illustration purposes to show Two Rounds in STAR Voting.

scenario_description: |-
  Pick your favorite ice cream flavor.
  Only one ballot (Voter) and only two candidates (Flavors).

  Caroline - she likes both flavors
  - she loves Choco flavor (5 stars)
  - she is OK with Vanilla flavor (3 stars)

voting_method: STAR   # STAR Voting - Single-winner
num_winners: 1

# very unusual case - just one ballot and only two candidates (as basic and simple as possible)
ballots: |-
  Choco,Vanilla
      5,      3       # Caroline - she likes both flavors

expected_winners:
  - Choco

# file: 01a_c2_b1_two-candidates.yaml
