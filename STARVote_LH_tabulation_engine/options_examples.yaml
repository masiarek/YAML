voting_method: STAR        # STAR (single-winner) or Bloc STAR (num_winners >= 2)
num_winners: 1

# ---------------------------------------------------------------------------
# options: — every display/analysis toggle the engine understands.
# Booleans accept: true/false, 1/0, yes/no, on/off.
# All are optional; the values shown here are illustrative, not the defaults.
# ---------------------------------------------------------------------------
options:
  show_matrix: true            # show the pairwise Preference Matrix
  matrix_finalists_only: false # if show_matrix: restrict it to the two finalists
  show_condorcet: true         # show the [Condorcet Winner] line
  show_score_counts: true      # show the per-candidate [Score Distribution] table
  brief: false                 # false = verbose round headers; true = compact
  collapse_ballots: true       # group identical ballots as "count × scores"
  count_separator: "×"         # separator for collapsed counts: "×", ":", or "x"/"X"

  # RCV / IRV cross-check.
  #   The [RCV-IRV, STAR, and Approval comparison] block is now ALWAYS printed,
  #   so this flag no longer changes anything. It is kept only so older YAML
  #   files that still set show_irv continue to parse. Scores are converted to
  #   ranks for RCV-IRV (higher score = higher preference, 0 = unranked); equal
  #   non-zero scores are broken by candidate priority order. Approval counts a
  #   score of 3, 4, or 5 (stars) as an approval. The Condorcet line appears
  #   only when a Condorcet winner exists and differs from all three.
  show_irv: true

# Tennessee-capital scenario: STAR and Condorcet elect Nashville, RCV-IRV elects
# Knoxville. Good demonstration of the [RCV-IRV, STAR, and Approval comparison]
# block (here the Condorcet line is hidden because Condorcet matches STAR).
ballots: |-
  Count:Memphis,Nashville,Chattanooga,Knoxville
  42:5,4,3,2
  26:2,5,4,3
  15:2,3,5,4
  17:2,3,4,5

