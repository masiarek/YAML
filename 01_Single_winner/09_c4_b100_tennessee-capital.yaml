election_title: Tennessee Capital — classic STAR example
scenario_description: |-
  The textbook Tennessee example. Memphis has the plurality (42%) but is too
  far from everyone else; Nashville, the central consensus choice, wins both the
  score round and the runoff. Shows why STAR rewards broad support over a large
  but isolated faction.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "The classic example. Four cities want to be the state capital. Memphis
       is the biggest - 42% - but it's far from everyone else. Watch: Memphis
       leads in raw size, yet Nashville, the central choice everyone can live
       with, wins."
  HOW: This is the closer for single-winner. Build suspense: 'the plurality
       front-runner is about to LOSE - and that's the right outcome.'
  WHY: Real-feeling stakes. It ties the whole single-winner arc together:
       broad support beats a large but isolated faction - exactly what we saw
       with Choco vs Vanilla, now at scale.
  CALLBACK: "Remember Choco (polarizing) losing to Vanilla (compromise)? Memphis
       is Choco. Nashville is Vanilla."
  TRANSITION: "That's single-winner STAR. When we need to fill SEVERAL seats,
       the rules change - on to multi-winner."

