election_title: The simplest possible single-winner STAR example

scenario_description: |-
  The smallest election that still shows BOTH of STAR's rounds: one ballot, two
  flavors. (An unusual, illustration-only scenario.)

  Caroline likes both flavors and scores them 0-5 - Chocolate 5 (she loves it),
  Vanilla 3 (she is OK with it).

  Scoring Round: the two top-scoring flavors advance; with only two on the menu,
  both do. Automatic Runoff: Caroline prefers Chocolate (5) over Vanilla (3), so
  Chocolate wins. With only two candidates STAR always agrees with ordinary, plurality
  voting - which is exactly why we start here.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "We just saw that STAR runs two rounds on one ballot. Let's watch those
       two rounds turn on the smallest election possible: one voter, two flavors."
  HOW: Slow and calm. This is the 'here are the gears' moment - no surprises.
  WHY: Establish the mechanics (Scoring Round, then Automatic Runoff) before any
       interesting behavior competes for attention.
  POINT OUT: With only two candidates STAR lands on the same winner as ordinary, plurality
       voting - that is expected, and it's exactly why we start here.
  TRANSITION: "Chocolate wins - no surprise with one voter. Now let's add more
       voters, and then a third flavor, and watch the winner start to move."
ballots: |-
  Chocolate,Vanilla
          5,      3       # Caroline - she likes both flavors

options:
  show_matrix: f
  matrix_finalists_only: f
  show_score_counts: n

expected_winners:
  - Chocolate

