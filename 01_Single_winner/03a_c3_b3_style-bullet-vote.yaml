# Voting styles — what a valid STAR ballot may look like.
# STAR lets you score each candidate 0–5 independently, so several styles are
# all legal on the same ballot set.

election_title: Voting styles — bullet voting
scenario_description: |-
  Shows three legal STAR ballot styles on one ballot set: a full/expressive
  ballot, a ballot with equal scores, and a bullet vote (only one candidate
  scored). All are valid; bullet voting is allowed but not recommended -
  scoring only one candidate gives your ballot no say in the automatic runoff
  unless that candidate is a finalist, so you forfeit influence over the final
  head-to-head.

# Presenter notes (ignored by the engine; not shown to the audience).
video_script: |-
  SAY: "There's no single 'right' way to fill out a STAR ballot. Here are three
       legal styles on one ballot set: a full ballot using the whole range, a
       ballot with equal scores, and a 'bullet vote' that scores only one."
  HOW: Walk down the three ballots, naming each style.
  WHY: Address the most common voter anxiety - 'am I doing this right?' - and
       introduce 'bullet voting' so you can warn against it.
  POINT OUT: Bullet voting is legal but weak: if your one pick doesn't reach the
       runoff, your ballot has no say in the final head-to-head.
  TRANSITION: "Bullet voting under-uses the ballot. Next: what about the opposite
       worry - what if you dislike everyone?"

voting_method: STAR   # STAR Voting — single-winner
num_winners: 1

ballots: |-
  Choco,Almond,Vanilla
      1,     2,      5   # full/expressive style
      0,     5,      5   # equal scores are OK
      0,     0,      5   # bullet voting

expected_winners:
  - Vanilla

